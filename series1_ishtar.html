<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ISHTAR — the Morning & Evening Star · Series I</title>
<style>
  :root{--bg:#0e0805;--ink:#f0e0d0;--dim:#b89478;--faint:#6a4e38;--cop:#c88a5a;--cop2:#9a6a3a;--rose:#c87a6a;--verd:#4a9a7a;--mono:ui-monospace,"DejaVu Sans Mono",Menlo,Consolas,monospace}
  *{box-sizing:border-box}html,body{margin:0;background:radial-gradient(ellipse at 50% 0%,#241408,#0e0805 62%);color:var(--ink);font-family:var(--mono)}
  .card{max-width:720px;margin:0 auto;padding:0 14px 50px}
  .frame{border:1px solid #3a2414;border-top:none;border-radius:0 0 12px 12px;background:linear-gradient(180deg,#140b06,#0e0805);padding:0 22px 26px;box-shadow:0 0 60px rgba(200,138,90,.07)}
  .topband{height:5px;background:linear-gradient(90deg,var(--verd),var(--cop),var(--rose))}
  .seriesrow{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 2px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--faint)}
  h1{text-align:center;font-size:44px;font-weight:700;color:var(--cop);margin:6px 0 0;letter-spacing:.16em;text-shadow:0 0 30px rgba(200,138,90,.35)}
  .epithet{text-align:center;font-size:13px;font-style:italic;color:var(--dim);letter-spacing:.08em}
  .oneline{text-align:center;font-size:12px;color:var(--faint);margin:2px 0 12px}
  canvas{display:block;width:100%}
  #sky{height:300px}
  .hint{text-align:center;font-size:10px;color:var(--faint);margin-top:8px}
  .essence{font-size:14px;line-height:1.7;text-align:center;font-style:italic;margin:14px 6px;color:var(--ink)}
  .double{background:#1a0e08;border:1px solid #3a2414;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:12px;line-height:1.6;text-align:center;color:var(--dim)}
  .double b{color:var(--cop)}
  h3{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--cop2);margin:22px 0 8px;border-bottom:1px solid #2a1a0e;padding-bottom:5px}
  .m{font-size:12.5px;line-height:1.7;color:var(--dim);margin:7px 0}.m b{color:var(--ink)}
  .comp{background:#1a0a10;border:1px solid #4a2430;border-radius:8px;padding:13px 16px;margin-top:6px}
  .comp .cn{font-size:15px;font-weight:700;color:var(--rose);letter-spacing:.06em}
  .comp .cr{font-size:11px;font-style:italic;color:#9a6a70;margin-bottom:6px}
  .comp .m b{color:var(--rose)}
  .alch{background:#0e1810;border:1px solid #24402e;border-radius:8px;padding:13px 16px;margin-top:6px}
  .alch .metal{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .alch .mg{font-size:26px;color:var(--cop)}
  .alch .mn{font-size:15px;font-weight:700;color:var(--cop);letter-spacing:.1em}
  .alch .grd{font-size:10px;color:var(--verd);letter-spacing:.08em}
  .alch .m b{color:var(--verd)}
  .cube-wrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:8px}
  #cube{width:200px;height:200px}
  .cube-cap{font-size:10.5px;color:var(--faint);line-height:1.6;max-width:300px;font-style:italic}
  .ainote,.held{font-size:10.5px;color:var(--faint);text-align:center;font-style:italic;margin-top:10px;line-height:1.6}
  .flagnote{font-size:9.5px;color:#4a5a4a;text-align:center;margin-top:6px;font-style:italic}
  .err{color:#f0b9a0;background:#160a08;border:1px dashed #e05a4a;padding:12px;font-size:12px;margin-top:10px;display:none}
</style></head>
<body><div class="card">
  <div class="frame">
    <div class="topband"></div>
    <div class="seriesrow"><span>Series &#8544; &#183; Venus</span><span>heritage &amp; mythos &#183; card 4</span></div>
    <h1>ISHTAR</h1>
    <div class="epithet">&#9792; the Morning &amp; Evening Star</div>
    <div class="oneline" id="oneline"></div>
    <canvas id="sky"></canvas>
    <div class="hint" id="hint">click &#183; rise as love, descend, die, and return as war</div>
    <div class="essence" id="essence"></div>
    <div class="double" id="double"></div>

    <h3>the mythos</h3>
    <div id="mythos"></div>

    <h3>the companion &#8212; the one she sends down</h3>
    <div class="comp" id="comp"></div>

    <h3>the alchemy &#8212; her metal</h3>
    <div class="alch" id="alch"></div>

    <h3>the colour-space &#8212; 27 cells of copper</h3>
    <div class="cube-wrap">
      <canvas id="cube"></canvas>
      <div class="cube-cap" id="cubecap"></div>
    </div>

    <div class="ainote" id="ainote"></div>
    <div class="held" id="held"></div>
    <div class="flagnote" id="flag"></div>
  </div>
  <div class="err" id="err"></div>
</div>
<script>
"use strict";
(function(){
  const D={"series": "I", "body": "VENUS", "name": "ISHTAR", "glyph": "\u2640", "epithet": "the Morning & Evening Star", "col": "#c88a5a", "col2": "#9a6a3a", "rose": "#c87a6a", "verd": "#4a9a7a", "essence": "love AND war in one body \u2014 the brightest star, who descends to the underworld and returns. not softened 'love' but the whole double blade: desire and battle, morning and evening, death and rebirth.", "one_line": "the same star opens the day with love and closes it with war.", "why_original": "Aphrodite is her softened Greek descendant \u2014 she kept the love, lost the war. Ishtar/Inanna kept BOTH. the truer, older, fuller face.", "double": "the DOUBLE STAR: as the MORNING star she is love & desire, rising before the sun; as the EVENING star she is war & the underworld, falling after it. one planet, two faces \u2014 the Greeks first thought them two stars.", "mythos": {"star": "the brightest point in the sky after sun & moon \u2014 which is WHY she is both love and war: too bright to be only one thing. worshipped from Sumer to Babylon for four thousand years.", "descent": "her DESCENT: Ishtar passes the seven gates of the underworld, stripped of a garment at each, arriving naked and powerless before her sister Ereshkigal \u2014 and dies. the world above goes barren; nothing mates, nothing grows.", "return": "the gods revive her \u2014 but the underworld's law demands a substitute. she returns through the seven gates, reclothed, reborn. the FIRST death-and-return myth ever written.", "warlove": "she is desire and slaughter at once \u2014 lions at her feet, the lovers she takes and destroys, the battle she stirs for joy. love that is not safe.", "kingship": "queen of heaven; her temple the center of the city; kings were her bridegrooms in the sacred marriage rite."}, "companion": {"name": "DUMUZI", "glyph": "\u2641", "role": "the lover she sends DOWN \u2014 the substitute, not the adviser", "who": "Tammuz/Dumuzi, her shepherd-husband. when the underworld demands a substitute for her return, she chooses HIM \u2014 sends her own lover down to take her place.", "counter": "where Chandra's Rohini is love that REFILLS (she pulls the moon back to full), Ishtar's Dumuzi is love that DEVOURS (she sends him to die so she may live). the two moon/venus loves are opposites: the beloved who saves vs. the beloved who is sacrificed.", "cycle": "Dumuzi rises for half the year and descends for the other half \u2014 the dying-and-rising god, the seasons themselves. her love writes the calendar in loss."}, "phases_walk": ["MORNING STAR rises \u2014 love, before the sun", "desire spreads over the world", "the first gate \u2014 the descent begins", "gates 2\u20136 \u2014 stripped, garment by garment", "the seventh gate \u2014 naked before Ereshkigal", "DEATH \u2014 the world above goes barren", "revived \u2014 but a substitute is owed", "she sends DUMUZI down in her place", "EVENING STAR falls \u2014 war, after the sun", "the return \u2014 reborn, reclothed, the cycle turns"], "alchemy": {"metal": "COPPER", "glyph": "\u2640", "grounding": "Babylonian \u2192 Greek \u2192 Latin (ancient, multi-culture)", "why": "Venus's metal is COPPER \u2014 and the tie is real, not invented: copper came from CYPRUS, Aphrodite/Venus's own birth-island; the soft bright metal 'rose up shining from the sea shores of Cyprus' as she did. its family runs from ROSE (polished copper) to VERDIGRIS GREEN (its patina) \u2014 love's blush and its tarnish, in one metal.", "note": "(the seven-metal / seven-planet system is ancient \u2014 Babylonian-Hellenistic, reaching into prehistory & grounded in the metals' real properties. the elaborate spiritual 'Great Work' stages are a later 16th-c. elaboration. only the metal-link is claimed here.)"}, "cube": {"note": "the 27-cell colour-space: her copper family, granular. (0,0,0) black, (2,2,2) white; the volume between is copper \u2014 rose on one axis, verdigris on another."}, "ai_note": "(VENUS the essence-name holds the science \u2014 the planet, 'venereal', the morning/evening star. Ishtar keeps the myth; Venus keeps the word; Aphrodite keeps the fame.)", "held": "VENUS = essence/title-card. APHRODITE = the famous-face card (love without the war). INANNA = the Sumerian root-name & DAUGHTER OF THE MOON (Sin) \u2014 the bloodline back to the Moon."};
  document.getElementById("oneline").textContent="\u201c"+D.one_line+"\u201d";
  document.getElementById("essence").textContent=D.essence;
  document.getElementById("double").innerHTML=D.double.replace(/MORNING/g,'<b>MORNING</b>').replace(/EVENING/g,'<b>EVENING</b>');
  const M=D.mythos;
  document.getElementById("mythos").innerHTML=
    '<div class="m"><b>the brightest.</b> '+M.star+'</div>'+
    '<div class="m"><b>the descent.</b> '+M.descent+'</div>'+
    '<div class="m"><b>the return.</b> '+M.return+'</div>'+
    '<div class="m"><b>love &amp; war.</b> '+M.warlove+'</div>'+
    '<div class="m"><b>queen of heaven.</b> '+M.kingship+'</div>'+
    '<div class="m" style="color:#9a7458"><b style="color:#c88a5a">the original.</b> '+D.why_original+'</div>';
  const C=D.companion;
  document.getElementById("comp").innerHTML=
    '<div class="cn">'+C.glyph+' '+C.name+'</div><div class="cr">'+C.role+'</div>'+
    '<div class="m">'+C.who+'</div>'+
    '<div class="m"><b>vs Rohini.</b> '+C.counter+'</div>'+
    '<div class="m"><b>the cycle.</b> '+C.cycle+'</div>';
  const A=D.alchemy;
  document.getElementById("alch").innerHTML=
    '<div class="metal"><span class="mg">\u2640</span><span class="mn">'+A.metal+'</span><span class="grd">'+A.grounding+'</span></div>'+
    '<div class="m">'+A.why+'</div>'+
    '<div class="m" style="font-size:10.5px;color:#6a7a68">'+A.note+'</div>';
  document.getElementById("cubecap").textContent=D.cube.note;
  document.getElementById("ainote").textContent=D.ai_note;
  document.getElementById("held").textContent=D.held;
  document.getElementById("flag").textContent="\u25c8 correspondence filter: only ancient, multi-culture ties admitted. copper/Venus = Babylonian\u2192Greek\u2192Latin \u2713 . tarot/planet mapping = Golden Dawn 1888, single-source \u2192 REJECTED (not heritage).";

  // ---------- the DESCENT visual: morning star -> 7 gates down -> death -> return as evening star ----------
  const cv=document.getElementById("sky"); let t=0, step=0;
  const N=D.phases_walk.length;
  function mono(){return getComputedStyle(document.body).getPropertyValue("--mono");}
  function draw(){
    const dpr=Math.min(devicePixelRatio||1,2),W=cv.clientWidth||680,H=300;
    cv.width=W*dpr;cv.height=H*dpr;const cx=cv.getContext("2d");cx.setTransform(dpr,0,0,dpr,0,0);cx.clearRect(0,0,W,H);
    // sky: morning (left, rose) vs evening (right, deep) vs underworld (bottom, dark)
    const g=cx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#241830");g.addColorStop(0.5,"#160e18");g.addColorStop(1,"#0a0508");cx.fillStyle=g;cx.fillRect(0,0,W,H);
    const HY=H*0.36;
    cx.strokeStyle="rgba(200,138,90,.2)";cx.beginPath();cx.moveTo(0,HY);cx.lineTo(W,HY);cx.stroke();
    cx.fillStyle="rgba(200,122,106,.6)";cx.font="9px "+mono();cx.textAlign="left";cx.fillText("MORNING \u2014 love",10,16);
    cx.textAlign="right";cx.fillText("war \u2014 EVENING",W-10,16);
    // seven gates (horizontal bands below horizon)
    for(let gt=0;gt<7;gt++){const y=HY+16+gt*((H-HY-30)/7);const passed=(step>=3&&gt<Math.min(step-2,7))||step>=5;
      cx.strokeStyle=passed?"rgba(200,138,90,.35)":"rgba(90,70,55,.35)";cx.beginPath();cx.moveTo(W*0.30,y);cx.lineTo(W*0.70,y);cx.stroke();
      cx.fillStyle=passed?"rgba(200,138,90,.5)":"rgba(90,70,55,.5)";cx.font="7px "+mono();cx.textAlign="left";cx.fillText("gate "+(gt+1),W*0.72,y+3);}
    // the star position: arcs from morning(left,high) down through gates to death(bottom), then up right(evening)
    let sx,sy,scol,slabel;
    const isEvening = step>=8;
    if(step<=1){ sx=W*(0.14+step*0.06); sy=HY-30-step*4; scol="#c87a6a"; }       // morning star, love
    else if(step<=5){ const d=(step-2)/3; sx=W*0.5; sy=HY+16+d*(H-HY-46); scol="#c88a5a"; } // descending
    else if(step===6){ sx=W*0.5; sy=H-24; scol="#7a5a48"; }                       // revived
    else if(step===7){ sx=W*0.5; sy=H-24; scol="#9a6a70"; }                        // sends Dumuzi
    else { const d=(step-8); sx=W*(0.72+d*0.08); sy=HY-20-d*6; scol="#b05a4a"; }   // evening star, war
    // star glow
    const gg=cx.createRadialGradient(sx,sy,1,sx,sy,26);gg.addColorStop(0,"#fff");gg.addColorStop(.4,scol);gg.addColorStop(1,"rgba(0,0,0,0)");
    cx.fillStyle=gg;cx.beginPath();cx.arc(sx,sy,26,0,7);cx.fill();
    // 8-point star (Ishtar's symbol)
    cx.save();cx.translate(sx,sy);cx.strokeStyle=scol;cx.fillStyle="#fff2e0";cx.lineWidth=1.5;
    for(let a=0;a<8;a++){const an=a*Math.PI/4,ln=(a%2?5:11)+2*Math.sin(t*2);cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(an)*ln,Math.sin(an)*ln);cx.stroke();}
    cx.beginPath();cx.arc(0,0,3.5,0,7);cx.fill();cx.restore();
    if(step===5){cx.fillStyle="#8a5a68";cx.font="10px "+mono();cx.textAlign="center";cx.fillText("the world above goes barren",W*0.5,HY-6);}
    if(step===7){cx.fillStyle="#9a6a70";cx.font="9px "+mono();cx.textAlign="center";cx.fillText("\u2641 Dumuzi descends in her place",W*0.5,H-40);}
    cx.fillStyle="#f0e0d0";cx.font="bold 12px "+mono();cx.textAlign="center";cx.fillText((step+1)+"/"+N+" \u2014 "+D.phases_walk[step],W*0.5,H-8);
    if(step===N-1){cx.fillStyle="#c88a5a";cx.font="bold 12px "+mono();cx.fillText("\u2640 reborn \u2014 the star returns",W*0.5,26);}
  }
  function frame(){try{draw();drawCube();}catch(e){document.getElementById("err").style.display="block";document.getElementById("err").textContent="star fault: "+(e&&e.message);return;}t+=0.03;requestAnimationFrame(frame);}
  cv.addEventListener("click",function(){step=(step+1)%N;
    document.getElementById("hint").textContent=step===N-1?"reborn \u2014 the cycle turns. click to rise again as the morning star.":"step "+(step+1)+" of "+N;});

  // ---------- the 27-CELL CUBE (copper colour-space) ----------
  const COPPER=[0.72,0.45,0.20], VERD=[0.30,0.64,0.52];
  function cellCol(i,j,k){
    const L=(i+j+k)/6, rose=i/2, patina=k/2, s=rose+patina;
    let fam = s>0 ? [(rose*COPPER[0]+patina*VERD[0])/s,(rose*COPPER[1]+patina*VERD[1])/s,(rose*COPPER[2]+patina*VERD[2])/s] : [.5,.5,.5];
    let c; if(L<=0.5){c=fam.map(v=>v*(L/0.5));} else {c=fam.map(v=>v+(1-v)*((L-0.5)/0.5));}
    return c.map(v=>Math.max(0,Math.min(1,v)));
  }
  function hx(c){return '#'+c.map(v=>('0'+Math.round(v*255).toString(16)).slice(-2)).join('');}
  const cvc=document.getElementById("cube"); let cyaw=0.6;
  function proj(x,y,z,W,H){const cy=Math.cos(cyaw),sy=Math.sin(cyaw);let x1=x*cy-z*sy,z1=x*sy+z*cy;const p=0.5,cp=Math.cos(p),sp=Math.sin(p);let y2=y*cp-z1*sp,z2=y*sp+z1*cp;const f=150,D2=6,s=f/(D2-z2);return[W/2+x1*s,H/2-y2*s,z2];}
  function drawCube(){
    const dpr=Math.min(devicePixelRatio||1,2),W=200,H=200;cvc.width=W*dpr;cvc.height=H*dpr;const cx=cvc.getContext("2d");cx.setTransform(dpr,0,0,dpr,0,0);cx.clearRect(0,0,W,H);
    cyaw+=0.006;
    const cells=[];
    for(let i=0;i<3;i++)for(let j=0;j<3;j++)for(let k=0;k<3;k++){
      const p=proj((i-1)*1.0,(j-1)*1.0,(k-1)*1.0,W,H);cells.push({i,j,k,p,col:hx(cellCol(i,j,k))});}
    cells.sort((a,b)=>a.p[2]-b.p[2]);
    cells.forEach(c=>{const r=6+ (c.p[2])*1.5;cx.fillStyle=c.col;cx.strokeStyle="rgba(200,180,160,.15)";cx.beginPath();cx.arc(c.p[0],c.p[1],Math.max(3,r),0,7);cx.fill();cx.stroke();});
    // mark black & white corners
    cx.fillStyle="#8a7060";cx.font="8px "+mono();cx.textAlign="center";cx.fillText("(0,0,0) black \u2192 (2,2,2) white",W/2,H-4);
  }
  requestAnimationFrame(frame);
})();
</script></body></html>
